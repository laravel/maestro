name: Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  lint-fix:
    name: Lint Fix (${{ matrix.name }})
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: React
            kit: React
          - name: Svelte
            kit: Svelte
          - name: Vue
            kit: Vue

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Orchestrator Dependencies
        working-directory: orchestrator
        run: |
          composer install --no-interaction --prefer-dist
          npm install

      - name: Build Kit
        working-directory: orchestrator
        run: php artisan build --no-interaction --kit=${{ matrix.kit }}

      - name: Install and Lint
        working-directory: build
        run: |
          npm install
          npm run lint
          npm run format
          npm run lint
          npm run format

      - name: Sync Fixes Back to Kits
        working-directory: orchestrator
        run: node scripts/watch.js --initial-sync-only

      - name: Upload Fixed Kits
        uses: actions/upload-artifact@v4
        with:
          name: kits-${{ matrix.kit }}
          path: kits/

  commit-fixes:
    name: Commit Lint Fixes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: lint-fix

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: kits-merged/
          merge-multiple: true

      - name: Apply Fixes
        run: |
          cp -r kits-merged/* kits/ 2>/dev/null || true
          rm -rf kits-merged/

      - name: Commit Changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A kits/
          if git diff --cached --quiet; then
            echo "No lint fixes needed."
            echo "pushed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "fix: auto-fix lint and formatting issues"
            git push
            echo "pushed=true" >> $GITHUB_OUTPUT
          fi

    outputs:
      pushed: ${{ steps.commit.outputs.pushed }}

  tests:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: commit-fixes
    if: always() && (needs.commit-fixes.result == 'skipped' || (needs.commit-fixes.result == 'success' && needs.commit-fixes.outputs.pushed != 'true'))

    strategy:
      fail-fast: false
      matrix:
        include:
          # Livewire variants
          - name: Livewire Kit (Blank)
            kit: Livewire
            build_flags: '--blank'
            path: blank-livewire-starter-kit
            node: false

          - name: Livewire Kit
            kit: Livewire
            build_flags: ''
            path: livewire-starter-kit
            node: false

          - name: Livewire Kit (Components)
            kit: Livewire
            build_flags: '--components'
            path: livewire-starter-kit-components
            node: false

          - name: Livewire Kit (WorkOS)
            kit: Livewire
            build_flags: '--workos'
            path: livewire-starter-kit-workos
            node: false

          # React variants
          - name: React Kit (Blank)
            kit: React
            build_flags: '--blank'
            path: blank-react-starter-kit
            node: true

          - name: React Kit
            kit: React
            build_flags: ''
            path: react-starter-kit
            node: true

          - name: React Kit (WorkOS)
            kit: React
            build_flags: '--workos'
            path: react-starter-kit-workos
            node: true

          # Svelte variants
          - name: Svelte Kit (Blank)
            kit: Svelte
            build_flags: '--blank'
            path: blank-svelte-starter-kit
            node: true

          - name: Svelte Kit
            kit: Svelte
            build_flags: ''
            path: svelte-starter-kit
            node: true

          - name: Svelte Kit (WorkOS)
            kit: Svelte
            build_flags: '--workos'
            path: svelte-starter-kit-workos
            node: true

          # Vue variants
          - name: Vue Kit (Blank)
            kit: Vue
            build_flags: '--blank'
            path: blank-vue-starter-kit
            node: true

          - name: Vue Kit
            kit: Vue
            build_flags: ''
            path: vue-starter-kit
            node: true

          - name: Vue Kit (WorkOS)
            kit: Vue
            build_flags: '--workos'
            path: vue-starter-kit-workos
            node: true

    steps:
      - name: Checkout Maestro
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Setup Node.js
        if: matrix.node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Composer Dependencies
        working-directory: orchestrator
        run: composer install --no-interaction --prefer-dist

      - name: Build ${{ matrix.name }}
        working-directory: orchestrator
        run: php artisan build --kit=${{ matrix.kit }} ${{ matrix.build_flags }}

      - name: Rename Build
        run: mv build ${{ matrix.path }}

      - name: Setup Kit
        working-directory: ${{ matrix.path }}
        run: composer setup

      - name: Run CI Checks
        working-directory: ${{ matrix.path }}
        run: composer ci:check
