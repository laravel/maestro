name: Lint Fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  lint-fix:
    name: Lint Fix (${{ matrix.name }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: React
            kit: React
          - name: Svelte
            kit: Svelte
          - name: Vue
            kit: Vue

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Orchestrator Dependencies
        working-directory: orchestrator
        run: |
          composer install --no-interaction --prefer-dist
          npm install

      - name: Build Kit
        working-directory: orchestrator
        run: php artisan build --no-interaction --kit=${{ matrix.kit }}

      - name: Install and Lint
        working-directory: build
        run: |
          npm install
          npm run lint
          npm run format
          npm run lint
          npm run format

      - name: Sync Fixes Back to Kits
        working-directory: orchestrator
        run: node scripts/watch.js --initial-sync-only

      - name: Upload Fixed Kits
        uses: actions/upload-artifact@v4
        with:
          name: kits-${{ matrix.kit }}
          path: kits/

  commit:
    name: Commit Fixes
    runs-on: ubuntu-latest
    needs: lint-fix

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: kits-merged/
          merge-multiple: true

      - name: Apply Fixes
        run: |
          cp -r kits-merged/* kits/ 2>/dev/null || true
          rm -rf kits-merged/

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A kits/
          if git diff --cached --quiet; then
            echo "No lint fixes needed."
          else
            git commit -m "fix: auto-fix lint and formatting issues"
            git push
          fi
